name: gender_sensitive_safety
description: Premium mobile safety app scaffold with real-time location sharing.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.0
  flutter_riverpod: ^2.5.1
  geolocator: ^13.0.1
  http: ^1.2.2
  latlong2: ^0.9.1
  shared_preferences: ^2.3.2
  web: ^1.1.1
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
