<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SafeRoute real-time safety navigation app.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SafeRoute">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SafeRoute</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #0B0B0D;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: #0B0B0D;
      pointer-events: none;
      z-index: -1;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #FFFFFF;
      font-family: Arial, Helvetica, sans-serif;
      background: #0B0B0D;
    }

    #splash strong {
      display: block;
      font-size: 28px;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    #splash span {
      color: #8E8E93;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div>
      <strong>SafeRoute</strong>
      <span>Preparing your safety dashboard</span>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
